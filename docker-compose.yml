version: "3.9"

services:
  home-energy-battery:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/einichi/home-energy-battery:latest
    container_name: home-energy-battery
    ports:
      - "8787:8787/tcp"
      - "3610:3610/udp"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DATA_DIR=/data
      - TZ=UTC
    volumes:
      # Named volume so the unprivileged container user inherits writable
      # ownership of /data (a host bind mount would be root-owned on creation).
      - home-energy-battery-data:/data
    restart: unless-stopped

volumes:
  home-energy-battery-data:
